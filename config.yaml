model_list:
  # Keep this legacy alias for your current cc-switch config compatibility.
  - model_name: gemmi-3.1-pro
    litellm_params:
      model: github_copilot/gemini-3.1-pro-preview
      extra_headers: &copilot_headers
        editor-version: "vscode/1.96.0"
        editor-plugin-version: "copilot/1.255.0"
        Copilot-Integration-Id: "vscode-chat"
        user-agent: "GithubCopilot/1.255.0"

  # Gemini
  - model_name: gemini-3.1-pro-preview
    litellm_params:
      model: github_copilot/gemini-3.1-pro-preview
      extra_headers: *copilot_headers
  - model_name: gemini-3-pro-preview
    litellm_params:
      model: github_copilot/gemini-3-pro-preview
      extra_headers: *copilot_headers
  - model_name: gemini-3-flash-preview
